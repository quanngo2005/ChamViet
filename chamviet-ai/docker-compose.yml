services:
  voice-service:
    build:
      context: ./voice-service
    ports:
      - "8000:8000"
    env_file:
      - ./voice-service/.env
    restart: unless-stopped

  vision-service:
    build:
      context: ./vision-service
    ports:
      - "5000:5000"
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
