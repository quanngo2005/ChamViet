spring.datasource.url=jdbc:h2:mem:chamviet;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.show-sql=false

jwt.secret=0123456789ABCDEFGHIJKLMNOPQRSTUVWX0123456789ABCDEFGHIJKLMNOP
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
jwt.refresh-secret=0123456789ABCDEFGHIJKLMNOPQRSTUVWX0123456789ABCDEFGHIJKLMNOP

encryption.secret-key=0123456789abcdef0123456789abcdef
api.key=test-api-key

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
